name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Buildozer Action
        uses: ArtemSerebrennikov/buildozer-action@master
        with:
          buildozer_version: master
          workdir: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: super-ai-apk
          path: bin/*.apk

